<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Report Settings</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body>
  <div class="page">
    <header class="header header-with-nav">
      <a class="btn btn-nav" href="{{ url_for('index') }}">&#8592; Dashboard</a>
      <a class="btn btn-nav" href="{{ url_for('scheduler.scheduler_dashboard_page') }}">Scheduled Reports</a>
      <a class="btn btn-nav" href="{{ url_for('scheduler.report_simple_new_page') }}">New Report</a>
      <h1>Report Settings</h1>
    </header>

    <div id="settingsBanner" class="system-banner hidden" role="status"></div>
    <div id="settingsError" class="error-banner hidden" role="alert"></div>

    <section class="panel">
      <h2 class="system-section-title">Report</h2>
      <p class="system-hint">Paths and scheduler behavior for scheduled report jobs.</p>
      <div class="system-inline-fields">
        <label class="field grow">
          <span class="field-label">Report source path</span>
          <div class="input-group">
            <input type="text" id="reportSourcePath" placeholder="\\FileServer\Reports\" />
            <button type="button" class="btn btn-browse" id="btnBrowseReportSource" data-target="reportSourcePath">Browse…</button>
          </div>
        </label>
        <label class="field">
          <span class="field-label">Poll interval (seconds)</span>
          <input type="number" id="pollingIntervalSeconds" min="5" step="1" />
        </label>
        <label class="field">
          <span class="field-label">Log retention (days)</span>
          <input type="number" id="logRetentionDays" min="1" step="1" />
        </label>
        <label class="field">
          <span class="field-label">Default expiration (hours)</span>
          <input type="number" id="defaultExpirationHours" min="0" step="1" />
        </label>
        <label class="field grow">
          <span class="field-label">Timezone</span>
          <input type="text" id="timezone" placeholder="America/Chicago" />
        </label>
      </div>
    </section>

    <section class="panel">
      <h2 class="system-section-title">Email</h2>
      <p class="system-hint">VB6 watcher folder — emails send when the <code>.dat</code> file is created.</p>
      <div class="system-inline-fields">
        <label class="field grow">
          <span class="field-label">Email root path</span>
          <div class="input-group">
            <input type="text" id="emailRootPath" placeholder="c:\email\" />
            <button type="button" class="btn btn-browse" id="btnBrowseEmailRoot" data-target="emailRootPath">Browse…</button>
          </div>
        </label>
        <label class="field grow">
          <span class="field-label">Admin notification email</span>
          <input type="email" id="adminNotificationEmail" placeholder="alerts@example.com" />
        </label>
      </div>
      <div class="system-actions">
        <button type="button" class="btn btn-run" id="btnTestEmailRoot">Test connection</button>
        <button type="button" class="btn btn-primary" id="btnSaveSettings">Save</button>
      </div>
    </section>

    <div class="modal-overlay hidden" id="folderPickerOverlay" role="dialog" aria-modal="true" aria-hidden="true">
      <div class="modal" role="document" aria-labelledby="folderPickerTitle">
        <div class="modal-header">
          <h2 class="modal-title" id="folderPickerTitle">Choose a folder</h2>
          <button type="button" class="btn btn-modal-close" id="btnCloseFolderPicker" aria-label="Close">&#10005;</button>
        </div>
        <div class="modal-body">
          <div class="folder-picker-path">
            <input type="text" id="folderPickerCurrent" placeholder="Type or paste a path and press Enter" />
            <button type="button" class="btn" id="btnFolderPickerGo">Go</button>
            <button type="button" class="btn" id="btnFolderPickerUp">&#8593; Up</button>
          </div>
          <div class="folder-picker-error error-banner hidden" id="folderPickerError" role="alert"></div>
          <ul class="folder-list" id="folderPickerList"></ul>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn" id="btnFolderPickerCancel">Cancel</button>
          <button type="button" class="btn btn-primary" id="btnFolderPickerUse">Use this folder</button>
        </div>
      </div>
    </div>
  </div>
  <script src="{{ url_for('static', filename='report_settings.js') }}"></script>
</body>
</html>
